<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام إدارة وماب مخزن كمال سعد - تطوير AB Studio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root {
            --primary-color: #1a252f;
            --secondary-color: #27ae60;
            --bg-color: #f4f7f6;
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-color); margin: 0; padding: 10px; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }

        /* التبويبات */
        .tabs { display: flex; gap: 5px; margin-bottom: 20px; border-bottom: 2px solid var(--primary-color); }
        .tab-btn { padding: 12px 25px; cursor: pointer; border: none; background: #ddd; font-weight: bold; border-radius: 10px 10px 0 0; }
        .tab-btn.active { background: var(--primary-color); color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* خريطة الخانات */
        .shelf-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px; margin-top: 20px; }
        .shelf-box { border: 2px solid #34495e; border-radius: 10px; background: #fff; position: relative; }
        .shelf-title { background: #34495e; color: white; padding: 5px; text-align: center; font-weight: bold; border-radius: 7px 7px 0 0; }
        .shelf-items { padding: 10px; font-size: 14px; }
        .item-tag { background: #f1f2f6; border-right: 4px solid var(--secondary-color); margin: 4px 0; padding: 5px; display: flex; justify-content: space-between; }

        .input-row { display: flex; flex-wrap: wrap; gap: 10px; background: #eee; padding: 15px; border-radius: 10px; margin-bottom: 20px; align-items: center; }
        select, input, button { padding: 10px; border-radius: 5px; border: 1px solid #ccc; }
        .btn-add { background: var(--secondary-color); color: white; border: none; cursor: pointer; font-weight: bold; }
        
        #syncStatus { position: fixed; bottom: 20px; left: 20px; background: var(--secondary-color); color: white; padding: 10px 20px; border-radius: 50px; display: none; z-index: 2000; }
    </style>
</head>
<body>

<div class="container">
    <header style="text-align:center;">
        <img src="https://files.catbox.moe/648uuj.jpg" style="height:60px; border-radius:10px;">
        <h2>نظام إدارة المخزن الذكي</h2>
    </header>

    <div class="tabs">
        <button class="tab-btn active" onclick="openTab(event, 'inventorySection')">الجرد اليومي</button>
        <button class="tab-btn" onclick="openTab(event, 'mapSection')">خريطة الخانات (الماب)</button>
    </div>

    <!-- قسم الجرد اليومي (نفس شغلك القديم مع تحسينات) -->
    <div id="inventorySection" class="tab-content active">
        <div class="input-row">
            <input type="text" id="invName" placeholder="اسم الصنف">
            <select id="invType">
                <option value="مسطر">مسطر (___)</option>
                <option value="بياني">بياني</option>
                <option value="صماء">صماء</option>
                <option value="انجليزي">انجليزي (E)</option>
                <option value="مربعات">مربعات (#)</option>
                <option value="9 سطر">9 سطر (9___)</option>
                <option value="صفحة وصفحة">ص،ص</option>
            </select>
            <select id="invSize">
                <option value="24">24</option>
                <option value="40">40</option>
                <option value="60">60</option>
                <option value="80">80</option>
                <option value="100">100</option>
                <option value="رسم 40">رسم 40</option>
                <option value="رسم حضانة">رسم حضانة</option>
                <option value="رسم 16">رسم 16</option>
            </select>
            <input type="number" id="invQty" placeholder="الكراتين">
            <button class="btn-add" onclick="addToDailyInventory()">إضافة للجرد</button>
        </div>
        <div id="dailyTableContainer">
            <!-- سيظهر جدول الجرد هنا -->
        </div>
    </div>

    <!-- قسم خريطة الخانات (الميزة الجديدة) -->
    <div id="mapSection" class="tab-content">
        <div class="input-row">
            <input type="text" id="shelfId" placeholder="رقم الخانة (مثلاً A1)">
            <input type="text" id="mapItemName" placeholder="اسم الصنف بالخانة">
            <input type="number" id="mapItemQty" placeholder="الكمية (بالتة/نصف)">
            <button class="btn-add" onclick="addToShelf()">تسكين في الخانة</button>
            <small>* يمكنك إضافة صنف جديد لنفس الخانة وسيتم رصه فوق القديم</small>
        </div>
        <div class="shelf-grid" id="mapGrid">
            <!-- ستظهر الخانات هنا تلقائياً -->
        </div>
    </div>
</div>

<div id="syncStatus">تم التحديث سحابياً بنجاح</div>

<script>
    // إعدادات Firebase (نفس إعداداتك لضمان عدم ضياع البيانات)
    const firebaseConfig = {
        apiKey: "AIzaSyDgwdBexMXQepqc7HVGL5tUDXU2JHOcuFg",
        databaseURL: "https://kmskoras-default-rtdb.europe-west1.firebasedatabase.app"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function openTab(evt, tabName) {
        var i, tabcontent, tablinks;
        tabcontent = document.getElementsByClassName("tab-content");
        for (i = 0; i < tabcontent.length; i++) tabcontent[i].style.display = "none";
        tablinks = document.getElementsByClassName("tab-btn");
        for (i = 0; i < tablinks.length; i++) tablinks[i].className = tablinks[i].className.replace(" active", "");
        document.getElementById(tabName).style.display = "block";
        evt.currentTarget.className += " active";
    }

    // وظيفة تسكين الأصناف في الخريطة
    function addToShelf() {
        const shelf = document.getElementById('shelfId').value;
        const name = document.getElementById('mapItemName').value;
        const qty = document.getElementById('mapItemQty').value;

        if(!shelf || !name) return alert("اكتب رقم الخانة واسم الصنف");

        // استخدام push لإضافة صنف جديد داخل نفس الخانة دون مسح القديم
        db.ref('warehouse_map/' + shelf).push({
            itemName: name,
            quantity: qty,
            time: Date.now()
        }).then(() => {
            showStatus();
            document.getElementById('mapItemName').value = '';
            document.getElementById('mapItemQty').value = '';
        });
    }

    // تحديث الخريطة لحظياً من Firebase
    db.ref('warehouse_map').on('value', (snapshot) => {
        const grid = document.getElementById('mapGrid');
        grid.innerHTML = '';
        const data = snapshot.val();

        for (let shelfId in data) {
            let shelfHtml = `<div class="shelf-box">
                <div class="shelf-title">خانة: ${shelfId}</div>
                <div class="shelf-items">`;
            
            const items = data[shelfId];
            for (let key in items) {
                shelfHtml += `<div class="item-tag">
                    <span>${items[key].itemName}</span>
                    <strong style="color:var(--secondary-color)">${items[key].quantity || ''}</strong>
                    <button onclick="deleteFromShelf('${shelfId}', '${key}')" style="border:none; color:red; background:none; cursor:pointer;">×</button>
                </div>`;
            }
            
            shelfHtml += `</div></div>`;
            grid.innerHTML += shelfHtml;
        }
    });

    function deleteFromShelf(shelfId, itemKey) {
        if(confirm("حذف هذا الصنف من الخانة؟")) {
            db.ref(`warehouse_map/${shelfId}/${itemKey}`).remove();
        }
    }

    function showStatus() {
        const s = document.getElementById('syncStatus');
        s.style.display = 'block';
        setTimeout(() => s.style.display = 'none', 2000);
    }
</script>
</body>
</html>
